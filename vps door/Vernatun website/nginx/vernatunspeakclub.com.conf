# Vernatun Armenian Club — static site
# App root: /home/infinity/Vernatun website/web
# Internal port: 85
#
# Install:
#   sudo cp "vps door/Vernatun website/nginx/vernatunspeakclub.com.conf" \
#     /etc/nginx/sites-available/vernatunspeakclub.com
#   sudo ln -sf /etc/nginx/sites-available/vernatunspeakclub.com \
#     /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# SSL:
#   sudo certbot --nginx -d vernatunspeakclub.com -d www.vernatunspeakclub.com

server {
    listen 85;
    listen [::]:85;
    server_name vernatunspeakclub.com www.vernatunspeakclub.com;

    root "/home/infinity/Vernatun website/web";
    index index.html;

    client_max_body_size 20M;

    location / {
        try_files $uri $uri/ =404;
    }

    location ~* \.(jpg|jpeg|png|gif|webp|svg|ico|css|js|mp4|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    access_log /var/log/nginx/vernatunspeakclub.com.access.log;
    error_log  /var/log/nginx/vernatunspeakclub.com.error.log;
}

server {
    listen 80;
    listen [::]:80;
    server_name vernatunspeakclub.com www.vernatunspeakclub.com;

    client_max_body_size 20M;

    location / {
        proxy_pass http://127.0.0.1:85;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    access_log /var/log/nginx/vernatunspeakclub.com.access.log;
    error_log  /var/log/nginx/vernatunspeakclub.com.error.log;
}
